# ─────────────────────────────────────────────────────────
# Nesomn Studio — Docker Compose (dev/staging)
# ─────────────────────────────────────────────────────────

services:
  # ── Database ──
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nesomn
    # Bind hanya ke localhost (bukan publik) agar host dapat menjalankan
    # migration/seed/test. Komunikasi antar container tetap via host `db`.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API (Elysia) ──
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nesomn
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost
      JWT_SECRET: dev-secret-change-me
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Worker (BullMQ) ──
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'bun' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Admin (Refine build + nginx, served internally at /admin) ──
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Client (Vite build + nginx) ──
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
